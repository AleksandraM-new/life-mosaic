<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Life Mosaic</title>
  <style>
    :root {
      --bg: #f7f2ec;
      --paper: #fffaf4;
      --paper-2: #f1e7dc;
      --ink: #221c18;
      --muted: #7e7168;
      --soft: #ded0c3;
      --line: rgba(34, 28, 24, .12);
      --accent: #6f4d38;
      --accent-2: #b9875c;
      --ok: #4f7f63;
      --warn: #a05b50;
      --shadow: 0 18px 45px rgba(57, 39, 26, .12);
      --radius-lg: 26px;
      --radius: 18px;
      --radius-sm: 12px;
      --nav-h: 78px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--ink); font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Arial, sans-serif; }
    body { -webkit-font-smoothing: antialiased; }
    button, input, textarea, select { font: inherit; color: inherit; }
    button { border: 0; cursor: pointer; }
    .app { min-height: 100vh; padding: 18px 14px calc(var(--nav-h) + 20px); max-width: 520px; margin: 0 auto; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin: 4px 2px 18px; }
    .brand { line-height: .98; }
    .brand small { display:block; color:var(--muted); font-size: 12px; letter-spacing:.16em; text-transform: uppercase; margin-bottom:6px; }
    h1 { font-family: ui-serif, Georgia, "Times New Roman", serif; font-size: 34px; font-weight: 560; margin:0; letter-spacing:-.04em; }
    .date-pill { display:flex; gap:8px; align-items:center; background: rgba(255,250,244,.62); border:1px solid var(--line); border-radius: 999px; padding:8px; box-shadow: 0 8px 22px rgba(57,39,26,.06); }
    .date-pill select { appearance:none; background:transparent; border:0; outline:0; font-size:13px; font-weight:700; padding:3px 2px; }
    .screen { display:none; animation: rise .22s ease; }
    .screen.active { display:block; }
    @keyframes rise { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .card { background: rgba(255,250,244,.78); border: 1px solid var(--line); border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 16px; margin-bottom: 14px; backdrop-filter: blur(14px); }
    .flat-card { background: rgba(255,250,244,.55); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
    .section-title { display:flex; align-items:end; justify-content:space-between; gap:12px; margin: 4px 0 12px; }
    h2 { font-size: 17px; margin:0; letter-spacing:-.02em; }
    h3 { font-size: 15px; margin:0 0 10px; }
    .hint { color:var(--muted); font-size:12px; line-height:1.35; }
    .calendar-week { display:grid; grid-template-columns: repeat(7, 1fr); gap: 7px; margin-bottom:8px; color: var(--muted); font-size: 11px; font-weight:800; text-align:center; letter-spacing:.04em; }
    .calendar-grid { display:grid; grid-template-columns: repeat(7, 1fr); gap: 7px; }
    .day { aspect-ratio: 1 / 1; min-height: 40px; border-radius: 12px; background: #e9ddd0; border: 1px solid rgba(34,28,24,.10); color: rgba(34,28,24,.86); font-weight:800; display:grid; place-items:center; box-shadow: inset 0 -10px 24px rgba(0,0,0,.045); transition: transform .15s ease, outline .15s ease; }
    .day.blank { opacity:0; pointer-events:none; }
    .day.selected { outline: 3px solid rgba(34,28,24,.65); outline-offset: 2px; transform: translateY(-1px); }
    .day.today:not(.selected) { outline: 2px solid rgba(111,77,56,.36); outline-offset: 2px; }
    .mini-trackers { display:grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .mini { padding:12px; border-radius:16px; background: rgba(241,231,220,.62); border:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .mini span { font-size:13px; font-weight:700; }
    .state { width:20px; height:20px; border-radius:50%; border: 1px solid var(--line); background:#d8cabe; position:relative; flex:0 0 auto; }
    .state.done { background: var(--ok); border-color: rgba(79,127,99,.35); }
    .state.done::after { content:""; position:absolute; left:6px; top:3px; width:5px; height:10px; border: solid #fffaf4; border-width:0 2px 2px 0; transform: rotate(45deg); }
    .goal-row, .media-row, .tracker-row { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 0; border-top:1px solid var(--line); }
    .goal-row:first-child, .media-row:first-child, .tracker-row:first-child { border-top:0; padding-top:0; }
    .progress { height:8px; background:rgba(34,28,24,.10); border-radius:999px; overflow:hidden; margin-top:8px; }
    .progress i { display:block; height:100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius:999px; }
    .tiny { font-size:11px; color:var(--muted); }
    .btn { min-height:44px; padding: 11px 14px; border-radius: 999px; background: var(--ink); color: #fffaf4; font-weight:800; box-shadow: 0 10px 24px rgba(34,28,24,.16); }
    .btn.secondary { background: rgba(255,250,244,.82); color: var(--ink); border:1px solid var(--line); box-shadow:none; }
    .btn.ghost { background: transparent; color: var(--accent); box-shadow:none; padding:8px 4px; min-height:auto; }
    .split { display:flex; gap:9px; align-items:center; flex-wrap:wrap; }
    .field { margin: 12px 0; }
    label { display:block; font-size:12px; color:var(--muted); margin-bottom:7px; font-weight:700; }
    input, textarea, select { width:100%; border:1px solid var(--line); background: rgba(255,250,244,.76); border-radius: 15px; min-height:44px; padding: 11px 12px; outline:0; }
    textarea { min-height:92px; resize:vertical; line-height:1.4; }
    input:focus, textarea:focus, select:focus { border-color: rgba(111,77,56,.55); box-shadow: 0 0 0 4px rgba(111,77,56,.10); }
    .slider-line { display:grid; grid-template-columns: 104px 1fr 28px; gap:10px; align-items:center; margin: 12px 0; }
    .slider-line b { font-size:13px; }
    input[type="range"] { padding:0; height: 32px; accent-color: var(--accent); border:0; background: transparent; }
    .emotion-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:8px; }
    .emotion { min-height:42px; border-radius: 14px; border:1px solid var(--line); background: rgba(255,250,244,.74); display:flex; align-items:center; gap:8px; padding:8px 10px; font-size:13px; font-weight:750; }
    .emotion.active { outline: 2px solid rgba(34,28,24,.52); outline-offset:1px; }
    .swatch { width:14px; height:14px; border-radius: 50%; border:1px solid rgba(34,28,24,.12); }
    .nav { position:fixed; left:50%; bottom:0; transform:translateX(-50%); width:min(520px, 100%); height:var(--nav-h); padding: 9px 10px calc(9px + env(safe-area-inset-bottom)); background: rgba(247,242,236,.9); backdrop-filter: blur(18px); border-top:1px solid var(--line); z-index:10; }
    .nav-scroll { overflow-x:auto; display:flex; gap:8px; scrollbar-width:none; padding-bottom:2px; }
    .nav-scroll::-webkit-scrollbar { display:none; }
    .nav button { min-width: 92px; height:48px; border-radius: 17px; background: rgba(255,250,244,.70); border:1px solid var(--line); color:var(--muted); font-weight:850; }
    .nav button.active { color:#fffaf4; background: var(--ink); border-color: var(--ink); }
    .modal { position:fixed; inset:0; z-index:20; display:none; background: rgba(34,28,24,.24); align-items:flex-end; justify-content:center; }
    .modal.open { display:flex; }
    .sheet { width:min(520px, 100%); max-height: 92vh; overflow:auto; background: var(--paper); border-radius: 30px 30px 0 0; padding: 18px 16px calc(18px + env(safe-area-inset-bottom)); box-shadow: 0 -20px 60px rgba(34,28,24,.25); }
    .sheet-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .close { width:42px; height:42px; border-radius:50%; background:var(--paper-2); font-size:22px; line-height:1; }
    .pill { display:inline-flex; align-items:center; min-height:30px; border-radius:999px; padding:6px 10px; background:rgba(241,231,220,.72); border:1px solid var(--line); font-size:12px; font-weight:800; color:var(--muted); }
    .tabs { display:flex; gap:8px; overflow:auto; margin-bottom:12px; scrollbar-width:none; }
    .tabs::-webkit-scrollbar { display:none; }
    .tab { white-space:nowrap; min-height:38px; padding:8px 12px; border-radius:999px; background:rgba(241,231,220,.7); color:var(--muted); font-weight:850; border:1px solid var(--line); }
    .tab.active { background: var(--ink); color:#fffaf4; border-color:var(--ink); }
    .subscreen { display:none; }
    .subscreen.active { display:block; }
    .stars { letter-spacing:1px; color:#b9875c; font-weight:900; }
    .empty { padding:20px 12px; text-align:center; color:var(--muted); border:1px dashed var(--line); border-radius: var(--radius); background:rgba(255,250,244,.44); }
    @media (min-width: 480px) { .app { padding-left: 18px; padding-right:18px; } .day { min-height:48px; } .emotion-grid { grid-template-columns: repeat(3, 1fr); } }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="brand"><small>personal dashboard</small><h1>Life Mosaic</h1></div>
      <div class="date-pill"><select id="monthSelect"></select><select id="yearSelect"></select></div>
    </div>

    <section id="screen-month" class="screen active">
      <div class="card">
        <div class="section-title"><h2 id="monthTitle">Month</h2><span class="hint">цвет дня = эмоции</span></div>
        <div class="calendar-week"><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span></div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>
      <div class="card">
        <div class="section-title"><h2 id="selectedDayTitle">Сегодня</h2><button class="btn secondary" id="openDayBtn">Открыть день</button></div>
        <div class="mini-trackers" id="miniTrackers"></div>
      </div>
      <div class="card"><div class="section-title"><h2>Цели месяца</h2><span class="hint">из Goals</span></div><div id="monthGoals"></div></div>
      <div class="card"><div class="section-title"><h2>Текущая книга</h2><button class="btn ghost" data-action="chooseBook">выбрать</button></div><div id="currentBook"></div></div>
      <div class="card"><div class="section-title"><h2>Текущий просмотр</h2><button class="btn ghost" data-action="chooseWatch">выбрать</button></div><div id="currentWatch"></div></div>
    </section>

    <section id="screen-pulse" class="screen">
      <div class="card"><div class="section-title"><h2>Активность дня</h2><span class="pill" id="pulseDate"></span></div>
        <div class="field"><label>Шаги</label><input id="stepsInput" type="number" min="0" placeholder="Например, 4820" /></div>
        <div class="field"><label>Чтение за день</label><input id="readingInput" type="number" min="0" placeholder="Страницы или минуты" /></div>
        <button class="btn" id="savePulseBtn">Сохранить активность</button>
      </div>
      <div class="card"><div class="section-title"><h2>Свои метрики</h2><button class="btn secondary" data-action="addMetric">Добавить</button></div><div id="customMetrics"></div></div>
    </section>

    <section id="screen-trackers" class="screen">
      <div class="card"><div class="section-title"><h2>Trackers</h2><button class="btn secondary" data-action="addTracker">Добавить</button></div><div id="trackerList"></div></div>
    </section>

    <section id="screen-goals" class="screen">
      <div class="card"><div class="section-title"><h2>Goals</h2><button class="btn secondary" data-action="addGoal">Добавить</button></div><div id="goalsList"></div></div>
    </section>

    <section id="screen-library" class="screen">
      <div class="tabs"><button class="tab active" data-sub="reading">Reading</button><button class="tab" data-sub="watch">Films & Series</button></div>
      <div id="sub-reading" class="subscreen active">
        <div class="card"><div class="section-title"><h2>Активные книги</h2><button class="btn secondary" data-action="addBook">Добавить</button></div><div id="activeBooks"></div></div>
        <div class="card"><div class="section-title"><h2>Библиотека книг</h2><button class="btn secondary" data-action="addArchiveBook">В архив</button></div><div id="bookArchive"></div></div>
      </div>
      <div id="sub-watch" class="subscreen">
        <div class="card"><div class="section-title"><h2>Активный просмотр</h2><button class="btn secondary" data-action="addWatch">Добавить</button></div><div id="activeWatch"></div></div>
        <div class="card"><div class="section-title"><h2>Фильмотека</h2><button class="btn secondary" data-action="addArchiveWatch">В архив</button></div><div id="watchArchive"></div></div>
      </div>
    </section>

    <section id="screen-insights" class="screen">
      <div class="card"><div class="section-title"><h2>Insights</h2><span class="hint">мысли из дневника</span></div><div id="insightsList"></div></div>
    </section>
  </main>

  <nav class="nav"><div class="nav-scroll">
    <button class="active" data-screen="month">Month</button><button data-screen="pulse">Pulse</button><button data-screen="trackers">Trackers</button><button data-screen="goals">Goals</button><button data-screen="library">Library</button><button data-screen="insights">Insights</button>
  </div></nav>

  <div class="modal" id="modal"><div class="sheet"><div class="sheet-head"><h2 id="modalTitle">Day</h2><button class="close" id="closeModal">×</button></div><div id="modalBody"></div></div></div>

  <script>
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const ruMonths = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
    const emotions = [
      ['calm','спокойствие','#9db7a8'],['joy','радость','#f0bf63'],['inspiration','вдохновение','#b89bdc'],['confidence','уверенность','#cc835c'],['tenderness','нежность','#e4a7b7'],['pride','гордость','#b7894c'],['interest','интерес','#7fa7c5'],['delight','восторг','#f08d7b'],['laziness','лень','#b8b0a2'],['tiredness','усталость','#8c8794'],['sadness','грусть','#7896bd'],['anxiety','тревога','#c9a15e'],['irritation','раздражение','#c77862'],['anger','злость','#a6403f'],['fear','страх','#6f6787']
    ];
    const today = new Date();
    const storeKey = 'lifeMosaic.v1';
    const seed = {
      selectedYear: today.getFullYear(), selectedMonth: today.getMonth(), selectedDay: today.getDate(),
      currentBookId: 'b1', currentWatchId: 'w1',
      days: {}, pulse: {}, metrics: [{id:'m1', name:'Вода', type:'число', values:{}}],
      goals: [
        {id:'g1', title:'ЛАБС хакатон', from:'2026-07-01', to:'2026-07-15', status:'активна', progress:42, desc:'Собрать Life Mosaic', sub:['Фронтенд','Демо','Презентация']},
        {id:'g2', title:'Здоровье', from:'2026-07-01', to:'2026-07-31', status:'активна', progress:68, desc:'Сон, шаги, регулярность', sub:['Шаги','Сон','Зарядка']},
        {id:'g3', title:'Дом', from:'2026-07-01', to:'2026-08-20', status:'длинная цель', progress:20, desc:'Большая цель на несколько месяцев', sub:['Разбор','План','Покупки']}
      ],
      trackers: [
        {id:'t1', title:'Зарядка', target:15, days:[1,2,4,7,9,11,12,13], reward:'массаж', status:'in progress'},
        {id:'t2', title:'Английский', target:20, days:[1,3,4,5,8,10,12], reward:'красивый блокнот', status:'in progress'}
      ],
      books: [
        {id:'b1', title:'The Creative Act', author:'Rick Rubin', mode:'pages', total:432, done:128, status:'читаю'},
        {id:'b2', title:'Atomic Habits', author:'James Clear', mode:'minutes', total:330, done:90, status:'пауза'}
      ],
      bookArchive: [{id:'ba1', title:'Пиши, сокращай', author:'Максим Ильяхов', date:'2026-06-20', rating:4.5, review:'Полезно для ясности текста.', quote:'Сильный текст держится на смысле.'}],
      watches: [{id:'w1', title:'Severance', type:'сериал', director:'Ben Stiller', actors:'Adam Scott, Britt Lower', desc:'офисная антиутопия', seasons:2, episodes:19, watched:8, status:'смотрю'}],
      watchArchive: [{id:'wa1', title:'Arrival', type:'фильм', director:'Denis Villeneuve', actors:'Amy Adams', desc:'sci-fi drama', date:'2026-06-12', rating:5, review:'Тихая, умная, красивая боль.'}]
    };
    let data = load();
    function load(){ try { return {...seed, ...JSON.parse(localStorage.getItem(storeKey)||'{}')}; } catch(e){ return structuredClone(seed); } }
    function save(){ localStorage.setItem(storeKey, JSON.stringify(data)); }
    function key(y=data.selectedYear,m=data.selectedMonth,d=data.selectedDay){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
    function dayData(k=key()){ return data.days[k] || (data.days[k] = {emotions:[], ratings:{energy:3, anxiety:2, sleepHours:7, sleepQuality:3, wellbeing:3, sociality:3, satisfaction:3}, journal:{thanksDay:'', thanksSelf:'', main:'', insight:''}}); }
    function pulseData(k=key()){ return data.pulse[k] || (data.pulse[k] = {steps:'', reading:''}); }
    function gradientFor(list){ if(!list || !list.length) return '#e9ddd0'; const colors=list.map(id => emotions.find(e=>e[0]===id)?.[2]).filter(Boolean); if(colors.length===1) return colors[0]; return `linear-gradient(135deg, ${colors.join(', ')})`; }
    function isRatingsDone(d){ return d.emotions.length && Object.values(d.ratings).every(v => String(v).length); }
    function isJournalDone(d){ return d.journal.thanksDay.trim() && d.journal.thanksSelf.trim() && d.journal.main.trim(); }
    function renderSelectors(){
      monthSelect.innerHTML = months.map((m,i)=>`<option value="${i}">${m}</option>`).join(''); monthSelect.value = data.selectedMonth;
      const y=today.getFullYear(); yearSelect.innerHTML = Array.from({length:9},(_,i)=>y-4+i).map(v=>`<option>${v}</option>`).join(''); yearSelect.value=data.selectedYear;
    }
    function renderCalendar(){
      renderSelectors(); monthTitle.textContent = `${months[data.selectedMonth]} ${data.selectedYear}`;
      const first = new Date(data.selectedYear, data.selectedMonth, 1); const days = new Date(data.selectedYear, data.selectedMonth+1,0).getDate(); const shift = (first.getDay()+6)%7;
      const cells=[]; for(let i=0;i<shift;i++) cells.push('<button class="day blank"></button>');
      for(let d=1; d<=days; d++){ const k=key(data.selectedYear,data.selectedMonth,d); const dd=data.days[k]; const cls=['day']; if(d===data.selectedDay) cls.push('selected'); if(d===today.getDate()&&data.selectedMonth===today.getMonth()&&data.selectedYear===today.getFullYear()) cls.push('today'); cells.push(`<button class="${cls.join(' ')}" style="background:${gradientFor(dd?.emotions)}" data-day="${d}">${d}</button>`); }
      calendarGrid.innerHTML=cells.join('');
      selectedDayTitle.textContent = `${data.selectedDay} ${ruMonths[data.selectedMonth]} ${data.selectedYear}`;
      renderMini(); renderMonthGoals(); renderCurrentMedia();
    }
    function renderMini(){ const d=dayData(); const p=pulseData(); const items=[['Оценки дня',isRatingsDone(d)],['Дневник',isJournalDone(d)],['Шаги',Number(p.steps)>1000],['Чтение',Number(p.reading)>15]]; miniTrackers.innerHTML=items.map(([t,ok])=>`<div class="mini"><span>${t}</span><i class="state ${ok?'done':''}"></i></div>`).join(''); pulseDate.textContent = `${data.selectedDay} ${ruMonths[data.selectedMonth]}`; stepsInput.value=p.steps||''; readingInput.value=p.reading||''; }
    function renderMonthGoals(){ monthGoals.innerHTML = data.goals.map(g=>`<div class="goal-row"><div style="flex:1"><b>${g.title}</b><div class="progress"><i style="width:${g.progress}%"></i></div></div><strong>${g.progress}%</strong></div>`).join(''); }
    function mediaCard(obj, empty){ if(!obj) return `<div class="empty">${empty}</div>`; return `<div class="media-row"><div><b>${obj.title}</b><div class="tiny">${obj.author || obj.director || 'автор не указан'}</div></div><span class="pill">${obj.status||'активно'}</span></div>`; }
    function renderCurrentMedia(){ currentBook.innerHTML=mediaCard(data.books.find(b=>b.id===data.currentBookId)||data.books[0], 'Нет активной книги'); currentWatch.innerHTML=mediaCard(data.watches.find(w=>w.id===data.currentWatchId)||data.watches[0], 'Нет активного просмотра'); }
    function renderPulse(){ renderMini(); customMetrics.innerHTML = data.metrics.map(m=>`<div class="flat-card"><b>${m.name}</b><div class="tiny">тип: ${m.type}</div><div class="field"><input data-metric="${m.id}" placeholder="Значение на день" value="${m.values?.[key()]||''}"></div></div>`).join('') || '<div class="empty">Свои метрики еще не добавлены</div>'; }
    function renderTrackers(){ trackerList.innerHTML = data.trackers.map(t=>`<div class="flat-card"><div class="section-title"><h3>${t.title}</h3><span class="pill">${t.status}</span></div><div class="tiny">Цель: ${t.target} из ${new Date(data.selectedYear,data.selectedMonth+1,0).getDate()} дней · прогресс ${t.days.length}/${t.target}</div><div class="progress"><i style="width:${Math.min(100,t.days.length/t.target*100)}%"></i></div><p class="hint">Подарок: ${t.reward}</p></div>`).join(''); }
    function renderGoals(){ goalsList.innerHTML = data.goals.map(g=>`<div class="flat-card"><div class="section-title"><h3>${g.title}</h3><strong>${g.progress}%</strong></div><div class="tiny">${g.from} — ${g.to} · ${g.status}</div><p>${g.desc}</p><div class="progress"><i style="width:${g.progress}%"></i></div><div class="split" style="margin-top:10px">${g.sub.map(s=>`<span class="pill">${s}</span>`).join('')}</div><button class="btn secondary" style="margin-top:12px" data-action="extendGoal" data-id="${g.id}">Продлить цель</button></div>`).join(''); }
    function starText(r){ const full=Math.floor(r); const half=r%1>=.5; return '★'.repeat(full)+(half?'½':'')+'☆'.repeat(Math.max(0,5-full-(half?1:0))); }
    function renderLibrary(){ activeBooks.innerHTML=data.books.map(b=>`<div class="flat-card"><div class="section-title"><h3>${b.title}</h3><span class="pill">${b.status}</span></div><div class="tiny">${b.author} · ${b.done}/${b.total} ${b.mode==='pages'?'стр.':'мин.'}</div><div class="progress"><i style="width:${Math.min(100,b.done/b.total*100)}%"></i></div></div>`).join(''); bookArchive.innerHTML=data.bookArchive.map(b=>`<div class="flat-card"><h3>${b.title}</h3><div class="tiny">${b.author} · ${b.date}</div><div class="stars">${starText(b.rating)}</div><p>${b.review}</p></div>`).join(''); activeWatch.innerHTML=data.watches.map(w=>`<div class="flat-card"><div class="section-title"><h3>${w.title}</h3><span class="pill">${w.status}</span></div><div class="tiny">${w.type} · ${w.director||'режиссер не указан'} · ${w.watched}/${w.episodes||1}</div><div class="progress"><i style="width:${Math.min(100,w.watched/(w.episodes||1)*100)}%"></i></div></div>`).join(''); watchArchive.innerHTML=data.watchArchive.map(w=>`<div class="flat-card"><h3>${w.title}</h3><div class="tiny">${w.type} · ${w.director||''} · ${w.actors||''}</div><div class="stars">${starText(w.rating)}</div><p>${w.review}</p></div>`).join(''); }
    function renderInsights(){ const rows=Object.entries(data.days).filter(([k,d])=>d.journal?.insight?.trim()).sort().reverse(); insightsList.innerHTML = rows.map(([k,d])=>`<div class="flat-card"><h3>${k}</h3><p>${d.journal.insight}</p><button class="btn secondary" data-open-date="${k}">Открыть день</button></div>`).join('') || '<div class="empty">Инсайтов пока нет</div>'; }
    function renderAll(){ renderCalendar(); renderPulse(); renderTrackers(); renderGoals(); renderLibrary(); renderInsights(); save(); }
    function openDay(){ const d=dayData(); modalTitle.textContent=`${data.selectedDay} ${ruMonths[data.selectedMonth]} ${data.selectedYear}`; modalBody.innerHTML=`
      <h3>Оценки дня</h3><div class="emotion-grid">${emotions.map(e=>`<button class="emotion ${d.emotions.includes(e[0])?'active':''}" data-emotion="${e[0]}"><i class="swatch" style="background:${e[2]}"></i>${e[1]}</button>`).join('')}</div>
      ${[['energy','Энергия'],['anxiety','Тревожность'],['sleepQuality','Качество сна'],['wellbeing','Самочувствие'],['sociality','Социальность'],['satisfaction','Удовлетворенность днем']].map(([id,label])=>`<div class="slider-line"><b>${label}</b><input type="range" min="1" max="5" value="${d.ratings[id]}" data-rating="${id}"><strong id="out-${id}">${d.ratings[id]}</strong></div>`).join('')}
      <div class="field"><label>Сон, часов</label><input type="number" min="0" max="24" step=".5" value="${d.ratings.sleepHours}" data-rating="sleepHours"></div>
      <h3>Дневник</h3>
      <div class="field"><label>Благодарность этому дню</label><textarea data-journal="thanksDay">${d.journal.thanksDay}</textarea></div>
      <div class="field"><label>Благодарность себе</label><textarea data-journal="thanksSelf">${d.journal.thanksSelf}</textarea></div>
      <div class="field"><label>Главное за день</label><textarea data-journal="main">${d.journal.main}</textarea></div>
      <div class="field"><label>Мысль / инсайт</label><textarea data-journal="insight">${d.journal.insight}</textarea></div>
      <button class="btn" id="saveDayBtn">Сохранить день</button>`; modal.classList.add('open'); }
    function openSimple(title, html, onSave){ modalTitle.textContent=title; modalBody.innerHTML=html+`<button class="btn" id="simpleSave">Сохранить</button>`; modal.classList.add('open'); document.getElementById('simpleSave').onclick=()=>{ onSave(); modal.classList.remove('open'); renderAll(); }; }
    document.addEventListener('click', e=>{
      const nav=e.target.closest('[data-screen]'); if(nav){ document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active')); nav.classList.add('active'); document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+nav.dataset.screen).classList.add('active'); }
      const day=e.target.closest('[data-day]'); if(day){ data.selectedDay=Number(day.dataset.day); renderAll(); }
      if(e.target.id==='openDayBtn') openDay();
      if(e.target.id==='closeModal') modal.classList.remove('open');
      const emo=e.target.closest('[data-emotion]'); if(emo){ const d=dayData(); const id=emo.dataset.emotion; d.emotions=d.emotions.includes(id)?d.emotions.filter(x=>x!==id):[...d.emotions,id]; openDay(); renderAll(); }
      const sub=e.target.closest('[data-sub]'); if(sub){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); sub.classList.add('active'); document.querySelectorAll('.subscreen').forEach(s=>s.classList.remove('active')); document.getElementById('sub-'+sub.dataset.sub).classList.add('active'); }
      const action=e.target.closest('[data-action]')?.dataset.action;
      if(action==='addGoal') openSimple('Новая цель', '<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Описание</label><textarea id="fDesc"></textarea></div><div class="field"><label>Прогресс, %</label><input id="fProgress" type="number" min="0" max="100" value="0"></div>', ()=>data.goals.push({id:crypto.randomUUID(), title:fTitle.value||'Новая цель', desc:fDesc.value||'', progress:Number(fProgress.value)||0, from:key(), to:key(), status:'активна', sub:[]}));
      if(action==='extendGoal') openSimple('Продлить цель', '<div class="field"><label>Новая дата окончания</label><input id="fTo" type="date"></div>', ()=>{ const g=data.goals.find(x=>x.id===e.target.dataset.id); if(g) g.to=fTo.value||g.to; });
      if(action==='addTracker') openSimple('Новый трекер', '<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Цель дней в месяц</label><input id="fTarget" type="number" value="10"></div><div class="field"><label>Подарок / мотивация</label><input id="fReward"></div>', ()=>data.trackers.push({id:crypto.randomUUID(), title:fTitle.value||'Новый трекер', target:Number(fTarget.value)||10, reward:fReward.value||'подарок', days:[], status:'in progress'}));
      if(action==='addMetric') openSimple('Новая метрика', '<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Тип</label><select id="fType"><option>число</option><option>минуты</option><option>да-нет</option><option>текст</option></select></div>', ()=>data.metrics.push({id:crypto.randomUUID(), name:fTitle.value||'Новая метрика', type:fType.value, values:{}}));
      if(action==='addBook') openSimple('Новая книга', '<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Автор</label><input id="fAuthor"></div><div class="field"><label>Формат</label><select id="fMode"><option value="pages">страницы</option><option value="minutes">минуты</option></select></div><div class="field"><label>Всего</label><input id="fTotal" type="number"></div>', ()=>data.books.push({id:crypto.randomUUID(), title:fTitle.value||'Книга', author:fAuthor.value||'', mode:fMode.value, total:Number(fTotal.value)||1, done:0, status:'читаю'}));
      if(action==='addArchiveBook') openSimple('Книга в библиотеку', '<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Автор</label><input id="fAuthor"></div><div class="field"><label>Оценка</label><input id="fRating" type="number" min="1" max="5" step=".5" value="5"></div><div class="field"><label>Мини-отзыв</label><textarea id="fReview"></textarea></div>', ()=>data.bookArchive.push({id:crypto.randomUUID(), title:fTitle.value||'Книга', author:fAuthor.value||'', date:key(), rating:Number(fRating.value)||5, review:fReview.value||''}));
      if(action==='addWatch') openSimple('Новый просмотр', '<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Тип</label><select id="fType"><option>фильм</option><option>сериал</option></select></div><div class="field"><label>Режиссер, опционально</label><input id="fDirector"></div><div class="field"><label>Актеры, опционально</label><input id="fActors"></div><div class="field"><label>Всего серий / 1 для фильма</label><input id="fEpisodes" type="number" value="1"></div>', ()=>data.watches.push({id:crypto.randomUUID(), title:fTitle.value||'Просмотр', type:fType.value, director:fDirector.value, actors:fActors.value, desc:'', episodes:Number(fEpisodes.value)||1, watched:0, status:'смотрю'}));
      if(action==='addArchiveWatch') openSimple('В фильмотеку', '<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Формат / описание</label><input id="fDesc"></div><div class="field"><label>Режиссер, опционально</label><input id="fDirector"></div><div class="field"><label>Актеры, опционально</label><input id="fActors"></div><div class="field"><label>Оценка</label><input id="fRating" type="number" min="1" max="5" step=".5" value="5"></div><div class="field"><label>Мини-отзыв</label><textarea id="fReview"></textarea></div>', ()=>data.watchArchive.push({id:crypto.randomUUID(), title:fTitle.value||'Фильм', type:fDesc.value||'', director:fDirector.value, actors:fActors.value, date:key(), rating:Number(fRating.value)||5, review:fReview.value||''}));
      if(action==='chooseBook') openSimple('Выбрать текущую книгу', `<div class="field"><label>Книга</label><select id="fChoice">${data.books.map(b=>`<option value="${b.id}">${b.title} — ${b.author}</option>`).join('')}</select></div>`, ()=>data.currentBookId=fChoice.value);
      if(action==='chooseWatch') openSimple('Выбрать текущий просмотр', `<div class="field"><label>Фильм / сериал</label><select id="fChoice">${data.watches.map(w=>`<option value="${w.id}">${w.title} — ${w.director||'без режиссера'}</option>`).join('')}</select></div>`, ()=>data.currentWatchId=fChoice.value);
      const openDate=e.target.closest('[data-open-date]'); if(openDate){ const [y,m,d]=openDate.dataset.openDate.split('-').map(Number); data.selectedYear=y; data.selectedMonth=m-1; data.selectedDay=d; renderAll(); openDay(); }
    });
    document.addEventListener('input', e=>{
      if(e.target.matches('[data-rating]')){ const id=e.target.dataset.rating; dayData().ratings[id]=e.target.value; const out=document.getElementById('out-'+id); if(out) out.textContent=e.target.value; save(); renderCalendar(); }
      if(e.target.matches('[data-journal]')){ dayData().journal[e.target.dataset.journal]=e.target.value; save(); renderCalendar(); renderInsights(); }
      if(e.target.matches('[data-metric]')){ const m=data.metrics.find(x=>x.id===e.target.dataset.metric); if(m){ m.values[key()]=e.target.value; save(); } }
    });
    monthSelect.onchange=()=>{ data.selectedMonth=Number(monthSelect.value); data.selectedDay=1; renderAll(); };
    yearSelect.onchange=()=>{ data.selectedYear=Number(yearSelect.value); data.selectedDay=1; renderAll(); };
    savePulseBtn.onclick=()=>{ const p=pulseData(); p.steps=stepsInput.value; p.reading=readingInput.value; renderAll(); };
    modal.addEventListener('click', e=>{ if(e.target===modal) modal.classList.remove('open'); });
    renderAll();
  </script>
</body>
</html>
