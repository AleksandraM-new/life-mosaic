  <style>
    :root{--bg:#f7f2ec;--paper:#fffaf4;--paper2:#f1e7dc;--ink:#221c18;--muted:#7e7168;--line:rgba(34,28,24,.12);--accent:#6f4d38;--accent2:#b9875c;--ok:#4f7f63;--danger:#b0360d;--shadow:0 18px 45px rgba(57,39,26,.12);--nav-h:78px;--r:18px;--rl:26px}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif;touch-action:manipulation} body{-webkit-font-smoothing:antialiased;overscroll-behavior:none} button,input,textarea,select{font:inherit;color:inherit} button{border:0;cursor:pointer}.app{min-height:100vh;padding:18px 14px calc(var(--nav-h) + 20px);max-width:520px;margin:0 auto}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:4px 2px 18px}.brand{line-height:.98}.brand small{display:block;color:var(--muted);font-size:12px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:6px}h1{font-family:ui-serif,Georgia,"Times New Roman",serif;font-size:34px;font-weight:560;margin:0;letter-spacing:-.04em}.date-pill{display:flex;gap:8px;align-items:center;background:rgba(255,250,244,.62);border:1px solid var(--line);border-radius:999px;padding:8px;box-shadow:0 8px 22px rgba(57,39,26,.06)}body:not(.on-month) .date-pill{display:none}.date-pill select{appearance:none;background:transparent;border:0;outline:0;font-size:13px;font-weight:700;padding:3px 2px}.screen{display:none;animation:rise .22s ease}.screen.active{display:block}@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.card{background:rgba(255,250,244,.78);border:1px solid var(--line);border-radius:var(--rl);box-shadow:var(--shadow);padding:16px;margin-bottom:14px;backdrop-filter:blur(14px)}.flat-card{background:rgba(255,250,244,.55);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:10px}.clickable{cursor:pointer}.section-title{display:flex;align-items:end;justify-content:space-between;gap:12px;margin:4px 0 12px}h2{font-size:17px;margin:0;letter-spacing:-.02em}h3{font-size:15px;margin:0 0 10px}.hint,.tiny{color:var(--muted);font-size:12px;line-height:1.35}.tiny{font-size:11px}.calendar-week,.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.calendar-week{margin-bottom:8px;color:var(--muted);font-size:11px;font-weight:800;text-align:center;letter-spacing:.04em}.day{aspect-ratio:1/1;min-height:40px;border-radius:12px;background:#e9ddd0;border:1px solid rgba(34,28,24,.10);color:rgba(34,28,24,.86);font-weight:800;display:grid;place-items:center;box-shadow:inset 0 -10px 24px rgba(0,0,0,.045);transition:.15s}.day.blank{opacity:0;pointer-events:none}.day.selected{outline:3px solid rgba(34,28,24,.65);outline-offset:2px;transform:translateY(-1px)}.day.today:not(.selected){outline:2px solid rgba(111,77,56,.36);outline-offset:2px}.mini-trackers{display:grid;grid-template-columns:1fr 1fr;gap:9px}.mini{padding:12px;border-radius:16px;background:rgba(241,231,220,.62);border:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px}.mini span{font-size:13px;font-weight:700}.state{width:20px;height:20px;border-radius:50%;border:1px solid var(--line);background:#d8cabe;position:relative;flex:0 0 auto}.state.done{background:var(--ok);border-color:rgba(79,127,99,.35)}.state.done:after{content:"";position:absolute;left:6px;top:3px;width:5px;height:10px;border:solid #fffaf4;border-width:0 2px 2px 0;transform:rotate(45deg)}.goal-row,.media-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-top:1px solid var(--line)}.goal-row:first-child,.media-row:first-child{border-top:0;padding-top:0}.progress{height:8px;background:rgba(34,28,24,.10);border-radius:999px;overflow:hidden;margin-top:8px}.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px}.btn{min-height:44px;padding:11px 14px;border-radius:999px;background:var(--ink);color:#fffaf4;font-weight:800;box-shadow:0 10px 24px rgba(34,28,24,.16)}.btn.secondary{background:rgba(255,250,244,.82);color:var(--ink);border:1px solid var(--line);box-shadow:none}.btn.ghost{background:transparent;color:var(--accent);box-shadow:none;padding:8px 4px;min-height:auto}.btn.danger{background:var(--danger)}.split{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.field{margin:12px 0}label{display:block;font-size:12px;color:var(--muted);margin-bottom:7px;font-weight:700}input,textarea,select{width:100%;border:1px solid var(--line);background:rgba(255,250,244,.76);border-radius:15px;min-height:44px;padding:11px 12px;outline:0}textarea{min-height:92px;resize:vertical;line-height:1.4}input:focus,textarea:focus,select:focus{border-color:rgba(111,77,56,.55);box-shadow:0 0 0 4px rgba(111,77,56,.10)}.slider-line{display:grid;grid-template-columns:104px 1fr 28px;gap:10px;align-items:center;margin:12px 0}.slider-line b{font-size:13px}input[type=range]{padding:0;height:32px;accent-color:var(--accent);border:0;background:transparent}.emotion-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.emotion{min-height:42px;border-radius:14px;border:1px solid var(--line);background:rgba(255,250,244,.74);display:flex;align-items:center;gap:8px;padding:8px 10px;font-size:13px;font-weight:750}.emotion.active{outline:2px solid rgba(34,28,24,.52);outline-offset:1px}.swatch{width:14px;height:14px;border-radius:50%;border:1px solid rgba(34,28,24,.12)}.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(520px,100%);height:var(--nav-h);padding:9px 10px calc(9px + env(safe-area-inset-bottom));background:rgba(247,242,236,.9);backdrop-filter:blur(18px);border-top:1px solid var(--line);z-index:10}.nav-scroll{overflow-x:auto;display:flex;gap:6px;scrollbar-width:none;padding-bottom:2px;-webkit-overflow-scrolling:touch;touch-action:pan-x}.nav-scroll::-webkit-scrollbar{display:none}.nav button{flex:0 0 auto;min-width:64px;height:48px;border-radius:17px;background:rgba(255,250,244,.70);border:1px solid var(--line);color:var(--muted);font-size:12px;font-weight:850;padding:0 8px}.nav button.active{color:#fffaf4;background:var(--ink);border-color:var(--ink)}.modal{position:fixed;inset:0;z-index:20;display:none;background:rgba(34,28,24,.24);align-items:flex-end;justify-content:center}.modal.open{display:flex}.sheet{width:min(520px,100%);max-height:92vh;overflow:auto;background:var(--paper);border-radius:30px 30px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -20px 60px rgba(34,28,24,.25)}.sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.close{width:42px;height:42px;border-radius:50%;background:var(--paper2);font-size:22px;line-height:1}.pill{display:inline-flex;align-items:center;min-height:30px;border-radius:999px;padding:6px 10px;background:rgba(241,231,220,.72);border:1px solid var(--line);font-size:12px;font-weight:800;color:var(--muted)}.tabs{display:flex;gap:8px;overflow:auto;margin-bottom:12px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{white-space:nowrap;min-height:38px;padding:8px 12px;border-radius:999px;background:rgba(241,231,220,.7);color:var(--muted);font-weight:850;border:1px solid var(--line)}.tab.active{background:var(--ink);color:#fffaf4;border-color:var(--ink)}.subscreen{display:none}.subscreen.active{display:block}.stars{letter-spacing:1px;color:#b9875c;font-weight:900}.empty{padding:20px 12px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:var(--r);background:rgba(255,250,244,.44)}.swipe{position:relative;overflow:hidden;border-radius:var(--r);margin-bottom:10px}.swipe .delete-bg{position:absolute;inset:0 auto 0 0;width:112px;background:var(--danger);color:#fffaf4;display:grid;place-items:center;font-weight:900}.swipe .swipe-content{position:relative;background:rgba(255,250,244,.55);border:1px solid var(--line);border-radius:var(--r);padding:14px;transition:transform .18s ease}.swipe.open .swipe-content{transform:translateX(96px)}.folder-card{display:flex;align-items:center;gap:12px}.folder-mark{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#f0dfc9,#fffaf4);border:1px solid var(--line);display:grid;place-items:center;font-weight:950;color:var(--accent)}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}.hidden{display:none!important}@media(max-width:390px){.nav button{min-width:61px;padding:0 6px;font-size:11px}}@media(min-width:480px){.app{padding-left:18px;padding-right:18px}.day{min-height:48px}.emotion-grid{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body class="on-month">
  <main class="app">
    <div class="topbar"><div class="brand"><small>personal dashboard</small><h1>Life Mosaic</h1></div><div class="date-pill"><select id="monthSelect"></select><select id="yearSelect"></select></div></div>
    <section id="screen-month" class="screen active">
      <div class="card"><div class="section-title"><h2 id="monthTitle">Month</h2></div><div class="calendar-week"><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span></div><div class="calendar-grid" id="calendarGrid"></div></div>
      <div class="card"><div class="section-title"><h2 id="selectedDayTitle">Сегодня</h2></div><div class="mini-trackers" id="miniTrackers"></div></div>
      <div class="card"><div class="section-title"><h2>Цели месяца</h2></div><div id="monthGoals"></div></div>
      <div class="card"><div class="section-title"><h2>Сейчас читаю</h2><button class="btn ghost" data-action="chooseBook">выбрать</button></div><div id="currentBook"></div></div>
      <div class="card"><div class="section-title"><h2>Сейчас смотрю</h2><button class="btn ghost" data-action="chooseWatch">выбрать</button></div><div id="currentWatch"></div></div>
    </section>
    <section id="screen-pulse" class="screen"><div class="card"><div class="section-title"><h2>Активность дня</h2><span class="pill" id="pulseDate"></span></div><div class="field"><label>Шаги</label><input id="stepsInput" type="number" min="0" placeholder="Например, 4820"><div class="tiny">единица: число</div></div><div class="field"><label>Чтение за день</label><div class="two"><input id="readingInput" type="number" min="0" placeholder="20"><select id="readingUnit"><option value="страницы">страницы</option><option value="минуты">минуты</option></select></div></div><button class="btn" id="savePulseBtn">Сохранить активность</button></div><div class="card"><div class="section-title"><h2>Свои метрики</h2><button class="btn secondary" data-action="addMetric">Добавить</button></div><div id="customMetrics"></div></div></section>
    <section id="screen-trackers" class="screen"><div class="card"><div class="section-title"><h2>Trackers</h2><button class="btn secondary" data-action="addTracker">Добавить</button></div><div id="trackerList"></div></div></section>
    <section id="screen-goals" class="screen"><div class="card"><div class="section-title"><h2>Goals</h2><button class="btn secondary" data-action="addGoal">Добавить</button></div><div id="goalsList"></div></div></section>
    <section id="screen-library" class="screen"><div class="tabs"><button class="tab active" data-sub="reading">Reading</button><button class="tab" data-sub="watch">Films & Series</button></div><div id="sub-reading" class="subscreen active"><div class="card"><div class="section-title"><h2>Сейчас читаю</h2><button class="btn secondary" data-action="addBook">Добавить</button></div><div id="activeBooks"></div></div><div class="card"><div class="section-title"><h2>Библиотека</h2><button class="btn secondary" data-action="addArchiveBook">В архив</button></div><div id="bookArchive"></div></div></div><div id="sub-watch" class="subscreen"><div class="card"><div class="section-title"><h2>Сейчас смотрю</h2><button class="btn secondary" data-action="addWatch">Добавить</button></div><div id="activeWatch"></div></div><div class="card"><div class="section-title"><h2>Фильмотека</h2><button class="btn secondary" data-action="addArchiveWatch">В архив</button></div><div id="watchArchive"></div></div></div></section>
    <section id="screen-insights" class="screen"><div class="card"><div class="section-title"><h2>Insights</h2><span class="hint">мысли из дневника</span></div><div id="insightsList"></div></div></section>
  </main>
  <nav class="nav"><div class="nav-scroll"><button class="active" data-screen="month">Month</button><button data-screen="pulse">Pulse</button><button data-screen="trackers">Trackers</button><button data-screen="goals">Goals</button><button data-screen="library">Library</button><button data-screen="insights">Insights</button></div></nav>
  <div class="modal" id="modal"><div class="sheet"><div class="sheet-head"><h2 id="modalTitle">Day</h2><button class="close" id="closeModal">×</button></div><div id="modalBody"></div></div></div>
  <script>
    const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
    const ruMonths=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
    const emotions=[['calm','спокойствие','#fff7a3'],['joy','радость','#f4f94d'],['inspiration','вдохновение','#22a070'],['interest','интерес','#9cfcdf'],['courage','смелость','#22a0ff'],['surprise','удивление','#e3ff57'],['admiration','восхищение','#ffbdc8'],['pride','гордость','#8929ff'],['laziness','лень','#c9c8ac'],['tiredness','усталость','#D5D5D5'],['sadness','грусть','#97b8c9'],['anxiety','тревога','#c3bef0'],['irritation','раздражение','#f46060'],['anger','злость','#b0360d']];
    const today=new Date(), storeKey='lifeMosaic.v2';
    const seed={selectedYear:today.getFullYear(),selectedMonth:today.getMonth(),selectedDay:today.getDate(),currentBookId:'b1',currentWatchId:'w1',days:{},pulse:{},metrics:[{id:'m1',name:'Вода',type:'литры',unit:'л',values:{}}],goals:[{id:'g1',title:'ЛАБС хакатон',from:'2026-07-01',to:'2026-07-15',status:'активна',progress:42,desc:'Собрать Life Mosaic',sub:[{id:'s1',title:'Фронтенд',progress:70,done:false},{id:'s2',title:'Демо',progress:20,done:false}]},{id:'g2',title:'Здоровье',from:'2026-07-01',to:'2026-07-31',status:'активна',progress:68,desc:'Регулярность и тело',sub:[]},{id:'g3',title:'Дом',from:'2026-07-01',to:'2026-08-20',status:'длинная цель',progress:20,desc:'Большая цель на несколько месяцев',sub:[]}],trackers:[{id:'t1',title:'Зарядка',target:15,days:[1,2,4,7,9,11,12,13],reward:'массаж',status:'in progress'},{id:'t2',title:'Английский',target:20,days:[1,3,4,5,8,10,12],reward:'красивый блокнот',status:'in progress'}],books:[{id:'b1',title:'The Creative Act',author:'Rick Rubin',mode:'pages',total:432,done:128,status:'читаю'},{id:'b2',title:'Atomic Habits',author:'James Clear',mode:'minutes',total:330,done:90,status:'пауза'}],bookArchive:[{id:'ba1',title:'Пиши, сокращай',author:'Максим Ильяхов',date:'2026-06-20',rating:4.5,review:'Полезно для ясности текста.',quote:'Сильный текст держится на смысле.'}],watches:[{id:'w1',title:'Severance',type:'сериал',director:'Ben Stiller',actors:'Adam Scott, Britt Lower',desc:'офисная антиутопия',seasons:2,episodes:19,seasonProgress:{1:true,2:false},watched:8,status:'смотрю'}],completedTrackers:[],watchArchive:[{id:'wa1',title:'Arrival',type:'фильм',director:'Denis Villeneuve',actors:'Amy Adams',desc:'sci-fi drama',date:'2026-06-12',rating:5,review:'Тихая, умная, красивая боль.'}]};
    let data=load(); migrate();
    function load(){try{return merge(seed,JSON.parse(localStorage.getItem(storeKey)||localStorage.getItem('lifeMosaic.v1')||'{}'))}catch(e){return structuredClone(seed)}}
    function merge(a,b){if(Array.isArray(a))return Array.isArray(b)?b:a; if(a&&typeof a==='object'){const o={...a,...(b||{})}; for(const k in a) if(b&&k in b) o[k]=merge(a[k],b[k]); return o} return b??a}
    function migrate(){data.metrics=(data.metrics||[]).map(m=>({...m,type:m.type==='да-нет'?'да/нет':m.type,unit:m.unit||unitFor(m.type)}));data.completedTrackers=data.completedTrackers||[];data.goals.forEach(g=>{g.sub=(g.sub||[]).map(s=>typeof s==='string'?{id:uid(),title:s,progress:0,weight:'',done:false}:{...s,weight:s.weight??''});autoThirdWeight(g);g.progress=calcGoalProgress(g)});save()}
    function save(){localStorage.setItem(storeKey,JSON.stringify(data))} function uid(){return crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random())}
    function key(y=data.selectedYear,m=data.selectedMonth,d=data.selectedDay){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
    function dayData(k=key()){return data.days[k]||(data.days[k]={emotions:[],ratings:{energy:3,anxiety:2,wellbeing:3,sociality:3,satisfaction:3},journal:{thanksDay:'',thanksSelf:'',main:'',insight:''}})}
    function pulseData(k=key()){return data.pulse[k]||(data.pulse[k]={steps:'',reading:'',readingUnit:'страницы'})}
    function unitFor(type){return ({'число':'число','минуты':'мин','литры':'л','километры':'км','да/нет':'да/нет','да-нет':'да/нет','текст':'текст'})[type]||type||''}
    function formatDate(s){if(!s)return''; const [y,m,d]=s.split('-'); return d&&m&&y?`${d}/${m}/${y}`:s}function weights(g){return(g.sub||[]).map(s=>s.weight===''||s.weight==null?null:Number(s.weight)||0)}function weightSum(g){return weights(g).filter(v=>v!==null).reduce((a,b)=>a+b,0)}function autoThirdWeight(g){const sub=g.sub||[];if(sub.length===3){const ws=weights(g),empty=ws.findIndex(v=>v===null);if(empty>=0&&ws.filter(v=>v!==null).length===2){const rest=100-ws.filter(v=>v!==null).reduce((a,b)=>a+b,0);sub[empty].weight=Math.max(0,rest)}}}function calcGoalProgress(g){const sub=g.sub||[];if(!sub.length)return Number(g.progress)||0;autoThirdWeight(g);let ws=weights(g),sum=ws.filter(v=>v!==null).reduce((a,b)=>a+b,0);if(!sum){const each=100/sub.length;return Math.round(sub.reduce((a,s)=>a+(Number(s.progress)||0)*each/100,0))}return Math.round(sub.reduce((a,s,i)=>a+(Number(s.progress)||0)*(ws[i]??0)/100,0))}function trendBars(vals,total=31){const arr=Array.from({length:Math.min(total,14)},(_,i)=>vals.includes(i+1));return`<div class="split" style="gap:3px;margin-top:10px">${arr.map(v=>`<i style="width:10px;height:${v?18:8}px;border-radius:999px;background:${v?'var(--accent)':'rgba(34,28,24,.12)'};display:block"></i>`).join('')}</div>`}function deleteItem(action,id){if(action==='deleteMetric')data.metrics=data.metrics.filter(x=>x.id!==id);if(action==='deleteTracker')data.trackers=data.trackers.filter(x=>x.id!==id);if(action==='deleteGoal')data.goals=data.goals.filter(x=>x.id!==id);if(action==='deleteBook')data.books=data.books.filter(x=>x.id!==id);if(action==='deleteWatch')data.watches=data.watches.filter(x=>x.id!==id);renderAll()}
    function gradientFor(list){if(!list||!list.length)return'#e9ddd0'; const colors=list.map(id=>emotions.find(e=>e[0]===id)?.[2]).filter(Boolean); return colors.length===1?colors[0]:`linear-gradient(135deg, ${colors.join(', ')})`}
    function isRatingsDone(d){return d.emotions.length&&['energy','anxiety','wellbeing','sociality','satisfaction'].every(k=>String(d.ratings[k]??'').length)}
    function isJournalDone(d){return d.journal.thanksDay.trim()&&d.journal.thanksSelf.trim()&&d.journal.main.trim()}
    function setScreen(name){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.screen===name));document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+name).classList.add('active');document.body.classList.toggle('on-month',name==='month')}
    function renderSelectors(){monthSelect.innerHTML=months.map((m,i)=>`<option value="${i}">${m}</option>`).join('');monthSelect.value=data.selectedMonth;const y=today.getFullYear();yearSelect.innerHTML=Array.from({length:9},(_,i)=>y-4+i).map(v=>`<option>${v}</option>`).join('');yearSelect.value=data.selectedYear}
    function renderCalendar(){renderSelectors();monthTitle.textContent=`${months[data.selectedMonth]} ${data.selectedYear}`;const first=new Date(data.selectedYear,data.selectedMonth,1),days=new Date(data.selectedYear,data.selectedMonth+1,0).getDate(),shift=(first.getDay()+6)%7,cells=[];for(let i=0;i<shift;i++)cells.push('<button class="day blank"></button>');for(let d=1;d<=days;d++){const k=key(data.selectedYear,data.selectedMonth,d),dd=data.days[k],cls=['day'];if(d===data.selectedDay)cls.push('selected');if(d===today.getDate()&&data.selectedMonth===today.getMonth()&&data.selectedYear===today.getFullYear())cls.push('today');cells.push(`<button class="${cls.join(' ')}" style="background:${gradientFor(dd?.emotions)}" data-day="${d}">${d}</button>`)}calendarGrid.innerHTML=cells.join('');selectedDayTitle.textContent=`${data.selectedDay} ${ruMonths[data.selectedMonth]} ${data.selectedYear}`;renderMini();renderMonthGoals();renderCurrentMedia()}
    function renderMini(){const d=dayData(),p=pulseData(),items=[['Оценки дня',isRatingsDone(d)],['Дневник',isJournalDone(d)],['Шаги',Number(p.steps)>1000],['Чтение',Number(p.reading)>15]];miniTrackers.innerHTML=items.map(([t,ok])=>`<div class="mini"><span>${t}</span><i class="state ${ok?'done':''}"></i></div>`).join('');pulseDate.textContent=`${data.selectedDay} ${ruMonths[data.selectedMonth]}`;stepsInput.value=p.steps||'';readingInput.value=p.reading||'';readingUnit.value=p.readingUnit||'страницы'}

 ${!t.days.includes(data.selectedDay)?'selected':''}>нет</option></select></div>`,()=>{t.days=t.days.filter(d=>d!==data.selectedDay);if(trackerYes.value==='yes')t.days.push(data.selectedDay)});return}if(action==='openGoal')openGoal(id);if(action==='addSubgoal'){const g=data.goals.find(x=>x.id===id);if(g.sub.length>=10)return;g.sub.push({id:uid(),title:'Новая подцель',progress:0,weight:'',done:false});openGoal(id);renderAll()}if(action==='editSubgoal')openSubgoal(a.dataset.goal,id);if(action==='deleteSubgoal'){const g=data.goals.find(x=>x.id===a.dataset.goal);if(g)g.sub=g.sub.filter(x=>x.id!==id);modal.classList.remove('open');renderAll()}if(action==='editBook')editBook(id);if(action==='editWatch')editWatch(id);if(action==='openBookArchive')openSimple('Библиотека',data.bookArchive.map(b=>`<div class="flat-card"><h3>${b.title}</h3><div class="tiny">${b.author} · ${formatDate(b.date)}</div><div class="stars">${starText(b.rating)}</div><p>${b.review}</p></div>`).join('')||'<div class="empty">Пусто</div>',()=>{});if(action==='openWatchArchive')openSimple('Фильмотека',data.watchArchive.map(w=>`<div class="flat-card"><h3>${w.title}</h3><div class="tiny">${w.type} · ${w.director||''} · ${w.actors||''}</div><div class="stars">${starText(w.rating)}</div><p>${w.review}</p></div>`).join('')||'<div class="empty">Пусто</div>',()=>{});if(action==='addGoal')openSimple('Новая цель','<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Описание</label><textarea id="fDesc"></textarea></div><div class="field"><label>Дата начала</label><input id="fFrom" type="date"></div><div class="field"><label>Дата окончания</label><input id="fTo" type="date"></div><div class="field"><label>Прогресс, %</label><input id="fProgress" type="number" min="0" max="100" value="0"></div>',()=>data.goals.push({id:uid(),title:fTitle.value||'Новая цель',desc:fDesc.value||'',progress:Number(fProgress.value)||0,from:fFrom.value||key(),to:fTo.value||key(),status:'активна',sub:[]}));if(action==='addTracker')openSimple('Новый трекер','<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Цель дней в месяц</label><input id="fTarget" type="number" value="10"></div><div class="field"><label>Подарок / мотивация</label><input id="fReward"></div>',()=>data.trackers.push({id:uid(),title:fTitle.value||'Новый трекер',target:Number(fTarget.value)||10,reward:fReward.value||'подарок',days:[],status:'in progress'}));if(action==='addMetric')openSimple('Новая метрика','<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Тип</label><select id="fType">'+typeOptions()+'</select></div><div class="field hidden" id="customUnitWrap"><label>Своя единица измерения</label><input id="fUnit" placeholder="например, страницы"></div>',()=>data.metrics.push({id:uid(),name:fTitle.value||'Новая метрика',type:fType.value,unit:fType.value==='другое'?fUnit.value:unitFor(fType.value),values:{}}));if(action==='addBook')openSimple('Новая книга','<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Автор</label><input id="fAuthor"></div><div class="field"><label>Формат</label><select id="fMode"><option value="pages">страницы</option><option value="minutes">минуты</option></select></div><div class="field"><label>Всего</label><input id="fTotal" type="number"></div>',()=>data.books.push({id:uid(),title:fTitle.value||'Книга',author:fAuthor.value||'',mode:fMode.value,total:Number(fTotal.value)||1,done:0,status:'читаю'}));if(action==='addArchiveBook')openSimple('Книга в библиотеку','<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Автор</label><input id="fAuthor"></div><div class="field"><label>Оценка</label><input id="fRating" type="number" min="1" max="5" step=".5" value="5"></div><div class="field"><label>Мини-отзыв</label><textarea id="fReview"></textarea></div>',()=>data.bookArchive.push({id:uid(),title:fTitle.value||'Книга',author:fAuthor.value||'',date:key(),rating:Number(fRating.value)||5,review:fReview.value||''}));if(action==='addWatch')openSimple('Новый просмотр','<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Тип</label><select id="fType"><option>фильм</option><option>сериал</option></select></div><div class="field"><label>Режиссер, опционально</label><input id="fDirector"></div><div class="field"><label>Актеры, опционально</label><input id="fActors"></div><div id="seriesFields"><div class="field"><label>Всего сезонов</label><input id="fSeasons" type="number" value="1"></div><div class="field"><label>Всего серий</label><input id="fEpisodes" type="number" value="1"></div></div>',()=>data.watches.push({id:uid(),title:fTitle.value||'Просмотр',type:fType.value,director:fDirector.value,actors:fActors.value,desc:'',seasons:fType.value==='сериал'?Number(fSeasons.value)||1:0,episodes:fType.value==='сериал'?Number(fEpisodes.value)||1:1,seasonProgress:{},watched:0,status:'смотрю'}));if(action==='addArchiveWatch')openSimple('В фильмотеку','<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Тип</label><select id="fType"><option>фильм</option><option>сериал</option></select></div><div class="field"><label>Режиссер, опционально</label><input id="fDirector"></div><div class="field"><label>Актеры, опционально</label><input id="fActors"></div><div class="field"><label>Оценка</label><input id="fRating" type="number" min="1" max="5" step=".5" value="5"></div><div class="field"><label>Мини-отзыв</label><textarea id="fReview"></textarea></div>',()=>data.watchArchive.push({id:uid(),title:fTitle.value||'Фильм',type:fType.value,director:fDirector.value,actors:fActors.value,date:key(),rating:Number(fRating.value)||5,review:fReview.value||''}));if(action==='chooseBook')openSimple('Выбрать текущую книгу',`<div class="field"><label>Книга</label><select id="fChoice">${data.books.map(b=>`<option value="${b.id}">${b.title} — ${b.author}</option>`).join('')}</select></div>`,()=>data.currentBookId=fChoice.value);if(action==='chooseWatch')openSimple('Выбрать текущий просмотр',`<div class="field"><label>Фильм / сериал</label><select id="fChoice">${data.watches.map(w=>`<option value="${w.id}">${w.title} — ${w.director||'без режиссера'}</option>`).join('')}</select></div>`,()=>data.currentWatchId=fChoice.value)});
    document.addEventListener('input',e=>{if(e.target.matches('[data-rating]')){const id=e.target.dataset.rating;dayData().ratings[id]=e.target.value;const out=document.getElementById('out-'+id);if(out)out.textContent=e.target.value;save();renderCalendar()}if(e.target.matches('[data-journal]')){dayData().journal[e.target.dataset.journal]=e.target.value;save();renderCalendar();renderInsights()}if(e.target.matches('[data-metric]')){const m=data.metrics.find(x=>x.id===e.target.dataset.metric);if(m){m.values[key()]=e.target.value;save()}}if(e.target.id==='fType'){const sf=document.getElementById('seriesFields');if(sf)sf.classList.toggle('hidden',e.target.value==='фильм');const cu=document.getElementById('customUnitWrap');if(cu)cu.classList.toggle('hidden',e.target.value!=='другое')}});
    document.addEventListener('change',e=>{if(e.target.matches('[data-book-status]')){const b=data.books.find(x=>x.id===e.target.dataset.bookStatus);if(b){b.status=e.target.value;save();renderLibrary()}}if(e.target.matches('[data-watch-status]')){const w=data.watches.find(x=>x.id===e.target.dataset.watchStatus);if(w){w.status=e.target.value;save();renderLibrary()}}});
    monthSelect.onchange=()=>{data.selectedMonth=Number(monthSelect.value);data.selectedDay=1;renderAll()};yearSelect.onchange=()=>{data.selectedYear=Number(yearSelect.value);data.selectedDay=1;renderAll()};savePulseBtn.onclick=()=>{const p=pulseData();p.steps=stepsInput.value;p.reading=readingInput.value;p.readingUnit=readingUnit.value;renderAll()};modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('open')});renderAll();
  </script>
</body>
