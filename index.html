dow:none}.btn.ghost{background:transparent;color:var(--accent);box-shadow:none;padding:8px 4px;min-height:auto}.btn.danger{background:var(--danger)}.split{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.field{margin:12px 0}label{display:block;font-size:12px;color:var(--muted);margin-bottom:7px;font-weight:700}input,textarea,select{width:100%;border:1px solid var(--line);background:rgba(255,250,244,.76);border-radius:15px;min-height:44px;padding:11px 12px;outline:0}textarea{min-height:92px;resize:vertical;line-height:1.4}input:focus,textarea:focus,select:focus{border-color:rgba(111,77,56,.55);box-shadow:0 0 0 4px rgba(111,77,56,.10)}.slider-line{display:grid;grid-template-columns:minmax(118px,1fr) minmax(118px,42%) 28px;gap:8px;align-items:center;margin:12px 0}.slider-line input[type=range]{justify-self:end;width:100%}.slider-line b{font-size:13px;line-height:1.15}input[type=range]{padding:0;height:32px;accent-color:var(--accent);border:0;background:transparent}.emotion-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.emotion{min-height:42px;border-radius:14px;border:1px solid var(--line);background:rgba(255,250,244,.74);display:flex;align-items:center;gap:8px;padding:8px 10px;font-size:13px;font-weight:750}.emotion.active{outline:2px solid rgba(34,28,24,.52);outline-offset:1px}.swatch{width:14px;height:14px;border-radius:50%;border:1px solid rgba(34,28,24,.12)}.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(520px,100%);height:var(--nav-h);padding:11px 10px calc(11px + env(safe-area-inset-bottom));background:rgba(247,242,236,.9);backdrop-filter:blur(18px);border-top:1px solid var(--line);z-index:10}.nav-scroll{overflow-x:auto;display:flex;gap:6px;scrollbar-width:none;padding-bottom:2px;-webkit-overflow-scrolling:touch;touch-action:pan-x}.nav-scroll::-webkit-scrollbar{display:none}.nav button{flex:0 0 auto;min-width:76px;height:56px;border-radius:19px;background:rgba(255,250,244,.70);border:1px solid var(--line);color:v <body class="on-month">
  <main class="app">
    <div class="topbar"><div class="brand"><small>personal dashboard</small><h1>Life Mosaic</h1></div><div class="date-pill"><select id="monthSelect"></select><select id="yearSelect"></select></div></div>
    <section id="screen-month" class="screen active">
      <div class="card" id="monthCalendarCard"><div class="section-title"><h2 id="monthTitle">Month</h2></div><div class="calendar-week"><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span></div><div class="calendar-grid" id="calendarGrid"></div></div>
      <div class="card"><div class="section-title"><h2 id="selectedDayTitle" class="clickable" data-action="pickSelectedDate">Сегодня</h2></div><div class="mini-trackers" id="miniTrackers"></div></div>
      <div class="card"><div class="section-title"><h2>Цели месяца</h2></div><div id="monthGoals"></div></div>
      <div class="card"><div class="section-title"><h2>Сейчас читаю</h2><button class="btn ghost" data-action="chooseBook">выбрать</button></div><div id="currentBook"></div></div>
      <div class="card"><div class="section-title"><h2>Сейчас смотрю</h2><button class="btn ghost" data-action="chooseWatch">выбрать</button></div><div id="currentWatch"></div></div>
    </section>
    <section id="screen-pulse" class="screen"><div class="card"><div class="section-title"><h2>Активность дня</h2><span class="pill" id="pulseDate"></span></div><div class="field"><label>Шаги</label><input id="stepsInput" type="number" min="0" placeholder="Например, 4820"><div class="tiny">число</div></div><div class="field"><label>Чтение за день</label><div class="two"><input id="readingInput" type="number" min="0" placeholder="20"><select id="readingUnit"><option value="страницы">страницы</option><option value="минуты">минуты</option></select></div></div><button class="btn" id="savePulseBtn">Сохранить активность</button></div><div class="card"><div class="section-title"><h2>Свои метрики</h2><button class="btn secondary" data-action="addMetric">Добавить</button></div><div id="customMetrics"></div></div></section>
    <section id="screen-trackers" class="screen"><div class="card"><div class="section-title"><div class="title-date"><h2>Trackers</h2><span class="pill" id="trackersDate"></span></div><button class="btn secondary" data-action="addTracker">Добавить</button></div><div id="trackerList"></div></div><div class="card"><div class="section-title"><h2>Мои успехи</h2><span class="hint">архив достигнутого</span></div><div id="successList"></div></div></section>
    <section id="screen-goals" class="screen"><div class="card"><div class="section-title"><div class="title-date"><h2>Goals</h2><span class="pill" id="goalsDate"></span></div><button class="btn secondary" data-action="addGoal">Добавить</button></div><div id="goalsList"></div></div></section>
    <section id="screen-library" class="screen"><div class="tabs"><button class="tab active" data-sub="reading">Reading</button><button class="tab" data-sub="watch">Films & Series</button></div><div id="sub-reading" class="subscreen active"><div class="card"><div class="section-title"><h2>Сейчас читаю</h2><button class="btn secondary" data-action="addBook">Добавить</button></div><div id="activeBooks"></div></div><div class="card"><div class="section-title"><h2>Библиотека</h2><button class="btn secondary" data-action="addArchiveBook">Добавить в библиотеку</button></div><div id="bookArchive"></div></div></div><div id="sub-watch" class="subscreen"><div class="card"><div class="section-title"><h2>Сейчас смотрю</h2><button class="btn secondary" data-action="addWatch">Добавить</button></div><div id="activeWatch"></div></div><div class="card"><div class="section-title"><h2>Фильмотека</h2><button class="btn secondary" data-action="addArchiveWatch">Добавить в фильмотеку</button></div><div id="watchArchive"></div></div></div></section>
    <section id="screen-insights" class="screen"><div class="card"><div class="section-title"><h2>Insights</h2><span class="hint">мысли из дневника</span></div><div id="insightsList"></div></div></section>
  </main>
  <nav class="nav"><div class="nav-scroll"><button class="active" data-screen="month">Month</button><button data-screen="pulse">Pulse</button><button data-screen="trackers">Trackers</button><button data-screen="goals">Goals</button><button data-screen="library">Library</button><button data-screen="insights">Insights</button></div></nav>
  <div class="modal" id="modal"><div class="sheet"><div class="sheet-head"><h2 id="modalTitle">Day</h2><button class="close" id="closeModal">×</button></div><div id="modalBody"></div></div></div>
  <script>

    const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
    const ruMonths=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
    const ruMonthsGen=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    const emotions=[['calm','спокойствие','#fff7a3'],['joy','радость','#f4f94d'],['inspiration','вдохновение','#22a070'],['interest','интерес','#9cfcdf'],['courage','смелость','#22a0ff'],['surprise','удивление','#7df53d'],['admiration','восхищение','#ff70d9'],['pride','гордость','#47fffc'],['laziness','лень','#c9c8ac'],['tiredness','усталость','#D5D5D5'],['sadness','грусть','#97b8c9'],['anxiety','тревога','#c3bef0'],['irritation','раздражение','#f46060'],['anger','злость','#b0360d']];
    const today=new Date(), storeKey='lifeMosaic.v2';
    const seed={selectedYear:today.getFullYear(),selectedMonth:today.getMonth(),selectedDay:today.getDate(),currentBookId:'b1',currentWatchId:'w1',days:{},pulse:{},metrics:[{id:'m1',name:'Вода',type:'литры',unit:'л',values:{}}],goals:[{id:'g1',title:'ЛАБС хакатон',from:'2026-07-01',to:'2026-07-15',status:'активна',progress:42,desc:'Собрать Life Mosaic',sub:[{id:'s1',title:'Фронтенд',progress:70,done:false,status:'в процессе',weight:50},{id:'s2',title:'Демо',progress:20,done:false,status:'в процессе',weight:50}]},{id:'g2',title:'Здоровье',from:'2026-07-01',to:'2026-07-31',status:'активна',progress:68,desc:'Регулярность и тело',sub:[]},{id:'g3',title:'Дом',from:'2026-07-01',to:'2026-08-20',status:'длинная цель',progress:20,desc:'Большая цель на несколько месяцев',sub:[]}],trackers:[{id:'t1',title:'Зарядка',target:15,days:[1,2,4,7,9,11,12,13],reward:'массаж',status:'in progress',giftReceived:false},{id:'t2',title:'Английский',target:20,days:[1,3,4,5,8,10,12],reward:'красивый блокнот',status:'in progress',giftReceived:false}],trackerSuccess:[],books:[{id:'b1',title:'The Creative Act',author:'Rick Rubin',mode:'pages',total:432,done:128,status:'читаю'},{id:'b2',title:'Atomic Habits',author:'James Clear',mode:'minutes',total:330,done:90,status:'пауза'}],bookArchive:[{id:'ba1',title:'Пиши, сокращай',author:'Максим Ильяхов',date:'2026-06-20',rating:4.5,review:'Полезно для ясности текста.',quote:'Сильный текст держится на смысле.'}],watches:[{id:'w1',title:'Severance',type:'сериал',director:'Ben Stiller',actors:'Adam Scott, Britt Lower',desc:'офисная антиутопия',seasons:2,episodes:19,seasonProgress:{1:true,2:false},watched:8,status:'смотрю'}],watchArchive:[{id:'wa1',title:'Arrival',type:'фильм',director:'Denis Villeneuve',actors:'Amy Adams',desc:'sci-fi drama',date:'2026-06-12',rating:5,review:'Тихая, умная, красивая боль.'}]};
    let data=load(); migrate();
    function load(){try{return merge(seed,JSON.parse(localStorage.getItem(storeKey)||localStorage.getItem('lifeMosaic.v1')||'{}'))}catch(e){return structuredClone(seed)}}
    function merge(a,b){if(Array.isArray(a))return Array.isArray(b)?b:a; if(a&&typeof a==='object'){const o={...a,...(b||{})}; for(const k in a) if(b&&k in b) o[k]=merge(a[k],b[k]); return o} return b??a}
    function uid(){return crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random())}
    function save(){localStorage.setItem(storeKey,JSON.stringify(data))}
    function key(y=data.selectedYear,m=data.selectedMonth,d=data.selectedDay){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
    function dateLabel(d=data.selectedDay,m=data.selectedMonth,y=data.selectedYear,withYear=false){return `${Number(d)} ${ruMonthsGen[Number(m)]}${withYear?' '+y:''}`}
    function daysInMonth(){return new Date(data.selectedYear,data.selectedMonth+1,0).getDate()}
    function clampDay(){data.selectedDay=Math.min(data.selectedDay,daysInMonth())}
    function dayData(k=key()){return data.days[k]||(data.days[k]={emotions:[],ratings:{energy:3,anxiety:2,wellbeing:3,sociality:3,satisfaction:3},journal:{thanksDay:'',thanksSelf:'',main:'',insight:''}})}
    function pulseData(k=key()){return data.pulse[k]||(data.pulse[k]={steps:'',reading:'',readingUnit:'страницы'})}
    function unitFor(type){return ({'число':'число','минуты':'мин','литры':'л','километры':'км','да/нет':'да/нет','да-нет':'да/нет','текст':'текст'})[type]||type||''}
    function metricTypeLabel(m){return m.type==='другое'?(m.unit||'мой вариант'):m.type}
    function formatDate(s){if(!s)return''; const [y,m,d]=s.split('-').map(Number); return d&&m&&y?`${d} ${ruMonthsGen[m-1]} ${y}`:s}
    function gradientFor(list){if(!list||!list.length)return'#e9ddd0'; const colors=list.map(id=>emotions.find(e=>e[0]===id)?.[2]).filter(Boolean); return colors.length===1?colors[0]:`linear-gradient(135deg, ${colors.join(', ')})`}
    function isRatingsDone(d){return d.emotions.length&&['energy','anxiety','wellbeing','sociality','satisfaction'].every(k=>String(d.ratings[k]??'').length)}
    function isJournalDone(d){return d.journal.thanksDay.trim()&&d.journal.thanksSelf.trim()&&d.journal.main.trim()}
    function subProgress(s){if((s.status||'')==='выполнено'||s.done)return 100; if((s.status||'')==='не начато')return 0; return Math.max(0,Math.min(100,Number(s.progress)||0))}
    function normalizeGoalWeights(g){g.sub=g.sub||[]; if(!g.sub.length)return; g.sub.forEach(s=>{if(!('status'in s))s.status=s.done?'выполнено':((Number(s.progress)||0)>0?'в процессе':'не начато')}); const set=g.sub.filter(s=>s.weight!==''&&s.weight!=null&&!Number.isNaN(Number(s.weight))); const unset=g.sub.filter(s=>s.weight===''||s.weight==null||Number.isNaN(Number(s.weight))); const used=set.reduce((a,s)=>a+Number(s.weight||0),0); if(unset.length===1)unset[0].weight=Math.max(0,100-used); else if(!set.length){const each=Math.floor(100/g.sub.length); g.sub.forEach((s,i)=>s.weight=i===g.sub.length-1?100-each*(g.sub.length-1):each)} }
    function goalProgress(g){normalizeGoalWeights(g); const subs=g.sub||[]; if(!subs.length)return Math.max(0,Math.min(100,Number(g.progress)||0)); const total=subs.reduce((a,s)=>a+Number(s.weight||0),0)||100; const val=subs.reduce((a,s)=>a+subProgress(s)*Number(s.weight||0)/total,0); g.progress=Math.round(val); return g.progress}

    document.addEventListener('click',e=>{const nav=e.target.closest('[data-screen]');if(nav){setScreen(nav.dataset.screen);return}const day=e.target.closest('[data-day]');if(day){data.selectedDay=Number(day.dataset.day);renderAll();openDay();return}if(e.target.id==='saveDayBtn'){save();modal.classList.remove('open');renderAll()}if(e.target.id==='closeModal'||e.target.closest('[data-action="modalBack"]')){modal.classList.remove('open');return}const emo=e.target.closest('[data-emotion]');if(emo){const d=dayData(),id=emo.dataset.emotion;d.emotions=d.emotions.includes(id)?d.emotions.filter(x=>x!==id):[...d.emotions,id];openDay();renderAll()}const sub=e.target.closest('[data-sub]');if(sub){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));sub.classList.add('active');document.querySelectorAll('.subscreen').forEach(s=>s.classList.remove('active'));document.getElementById('sub-'+sub.dataset.sub).classList.add('active');return}const openDate=e.target.closest('[data-open-date]');if(openDate){const [y,m,d]=openDate.dataset.openDate.split('-').map(Number);data.selectedYear=y;data.selectedMonth=m-1;data.selectedDay=d;renderAll();openDay();return}if(e.target.closest('select,input,textarea')&&e.target.closest('.swipe-content'))return;const a=e.target.closest('[data-action]');if(!a)return;const action=a.dataset.action,id=a.dataset.id;if(['deleteMetric','deleteTracker','deleteGoal','deleteBook','deleteWatch','deleteArchiveBook','deleteArchiveWatch'].includes(action)){if(action==='deleteMetric')data.metrics=data.metrics.filter(x=>x.id!==id);if(action==='deleteTracker')data.trackers=data.trackers.filter(x=>x.id!==id);if(action==='deleteGoal')data.goals=data.goals.filter(x=>x.id!==id);if(action==='deleteBook')data.books=data.books.filter(x=>x.id!==id);if(action==='deleteWatch')data.watches=data.watches.filter(x=>x.id!==id);if(action==='deleteArchiveBook')data.bookArchive=data.bookArchive.filter(x=>x.id!==id);if(action==='deleteArchiveWatch')data.watchArchive=data.watchArchive.filter(x=>x.id!==id);renderAll();return}if(action==='pickSelectedDate')openSimple('Выбрать дату',`<div class="field"><label>Дата</label><input id="fDate" type="date" value="${key()}"></div>`,()=>{const [y,m,d]=fDate.value.split('-').map(Number);data.selectedYear=y;data.selectedMonth=m-1;data.selectedDay=d});if(action==='openMetric')openMetric(id);if(action==='openTracker')openTracker(id);if(action==='openSuccess')openSuccess(id);if(action==='openGoal')openGoal(id);if(action==='addSubgoal'){const g=data.goals.find(x=>x.id===id);if(g.sub.length>=10)return;g.sub.push({id:uid(),title:'Новая подцель',progress:0,status:'не начато',done:false,weight:''});normalizeGoalWeights(g);openGoal(id);renderAll()}if(action==='editSubgoal')openSubgoal(a.dataset.goal,id);if(action==='deleteSubgoal'){const g=data.goals.find(x=>x.id===a.dataset.goal);if(g)g.sub=g.sub.filter(x=>x.id!==id);modal.classList.remove('open');renderAll()}if(action==='editBook')editBook(id);if(action==='editWatch')editWatch(id);if(action==='editArchiveBook')editBook(id,true);if(action==='editArchiveWatch')editWatch(id,true);if(action==='openBookArchive')openSimple('Библиотека',data.bookArchive.map(b=>swipeCard(`<h3>${b.title}</h3><div class="tiny">${b.author||''} · ${formatDate(b.date)}</div><div class="stars">${starText(b.rating||5)}</div><p>${b.review||''}</p>`,'deleteArchiveBook',b.id,'editArchiveBook')).join('')||'<div class="empty">Пусто</div>',()=>{},'Готово');if(action==='openWatchArchive')openSimple('Фильмотека',data.watchArchive.map(w=>swipeCard(`<h3>${w.title}</h3><div class="tiny">${w.type} · ${w.director||''} · ${w.actors||''}</div><div class="stars">${starText(w.rating||5)}</div><p>${w.review||''}</p>`,'deleteArchiveWatch',w.id,'editArchiveWatch')).join('')||'<div class="empty">Пусто</div>',()=>{},'Готово');if(action==='addGoal')openSimple('Новая цель','<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Описание</label><textarea id="fDesc"></textarea></div><div class="field"><label>Дата начала</label><input id="fFrom" type="date"></div><div class="field"><label>Дата окончания</label><input id="fTo" type="date"></div>',()=>data.goals.push({id:uid(),title:fTitle.value||'Новая цель',desc:fDesc.value||'',progress:0,from:fFrom.value||key(),to:fTo.value||key(),status:'активна',sub:[]}));if(action==='addTracker')openSimple('Новый трекер','<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Цель дней в месяц</label><input id="fTarget" type="number" value="10"></div><div class="field"><label>Подарок / мотивация</label><input id="fReward"></div>',()=>data.trackers.push({id:uid(),title:fTitle.value||'Новый трекер',target:Number(fTarget.value)||10,reward:fReward.value||'подарок',days:[],status:'in progress',giftReceived:false}));if(action==='addMetric')openSimple('Новая метрика','<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Тип</label><select id="fType">'+typeOptions()+'</select></div><div class="field hidden" id="customUnitWrap"><label>Мой вариант</label><input id="fUnit" placeholder="например, страницы"></div>',()=>data.metrics.push({id:uid(),name:fTitle.value||'Новая метрика',type:fType.value,unit:fType.value==='другое'?fUnit.value:unitFor(fType.value),values:{}}));if(action==='addBook')openSimple('Новая книга','<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Автор</label><input id="fAuthor"></div><div class="field"><label>Формат</label><select id="fMode"><option value="pages">страницы</option><option value="minutes">минуты</option></select></div><div class="field"><label>Всего</label><input id="fTotal" type="number"></div>',()=>data.books.push({id:uid(),title:fTitle.value||'Книга',author:fAuthor.value||'',mode:fMode.value,total:Number(fTotal.value)||1,done:0,status:'читаю'}));if(action==='addArchiveBook')openSimple('Добавить в библиотеку','<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Автор</label><input id="fAuthor"></div><div class="field"><label>Оценка</label><input id="fRating" type="number" min="1" max="5" step=".5" value="5"></div><div class="field"><label>Мини-отзыв</label><textarea id="fReview"></textarea></div>',()=>data.bookArchive.push({id:uid(),title:fTitle.value||'Книга',author:fAuthor.value||'',date:key(),rating:Number(fRating.value)||5,review:fReview.value||''}));if(action==='addWatch')openSimple('Новый просмотр','<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Тип</label><select id="fType"><option>фильм</option><option>сериал</option></select></div><div class="field"><label>Режиссер, опционально</label><input id="fDirector"></div><div class="field"><label>Актеры, опционально</label><input id="fActors"></div><div id="seriesFields"><div class="field"><label>Всего сезонов</label><input id="fSeasons" type="number" value="1"></div><div class="field"><label>Всего серий</label><input id="fEpisodes" type="number" value="1"></div></div>',()=>data.watches.push({id:uid(),title:fTitle.value||'Просмотр',type:fType.value,director:fDirector.value,actors:fActors.value,desc:'',seasons:fType.value==='сериал'?Number(fSeasons.value)||1:0,episodes:fType.value==='сериал'?Number(fEpisodes.value)||1:1,seasonProgress:{},watched:0,status:'смотрю'}));if(action==='addArchiveWatch')openSimple('Добавить в фильмотеку','<div class="field"><label>Название</label><input id="fTitle"></div><div class="field"><label>Тип</label><select id="fType"><option>фильм</option><option>сериал</option></select></div><div class="field"><label>Режиссер, опционально</label><input id="fDirector"></div><div class="field"><label>Актеры, опционально</label><input id="fActors"></div><div class="field"><label>Оценка</label><input id="fRating" type="number" min="1" max="5" step=".5" value="5"></div><div class="field"><label>Мини-отзыв</label><textarea id="fReview"></textarea></div>',()=>data.watchArchive.push({id:uid(),title:fTitle.value||'Фильм',type:fType.value,director:fDirector.value,actors:fActors.value,date:key(),rating:Number(fRating.value)||5,review:fReview.value||''}));if(action==='chooseBook')openSimple('Выбрать текущую книгу',`<div class="field"><label>Книга</label><select id="fChoice">${data.books.filter(b=>b.status!=='прочитано').map(b=>`<option value="${b.id}">${b.title} — ${b.author}</option>`).join('')}</select></div>`,()=>data.currentBookId=fChoice.value);if(action==='chooseWatch')openSimple('Выбрать текущий просмотр',`<div class="field"><label>Фильм / сериал</label><select id="fChoice">${data.watches.filter(w=>w.status!=='закончен').map(w=>`<option value="${w.id}">${w.title} — ${w.director||'без режиссера'}</option>`).join('')}</select></div>`,()=>data.currentWatchId=fChoice.value)});
    document.addEventListener('input',e=>{if(e.target.matches('[data-rating]')){const id=e.target.dataset.rating;dayData().ratings[id]=e.target.value;const out=document.getElementById('out-'+id);if(out)out.textContent=e.target.value;save();renderCalendar()}if(e.target.matches('[data-journal]')){dayData().journal[e.target.dataset.journal]=e.target.value;save();renderCalendar();renderInsights()}if(e.target.matches('[data-metric]')){const m=data.metrics.find(x=>x.id===e.target.dataset.metric);if(m){m.values[key()]=e.target.value;save()}}if(e.target.id==='fType'||e.target.id==='mType'){const sf=document.getElementById('seriesFields');if(sf)sf.classList.toggle('hidden',e.target.value==='фильм');const cu=document.getElementById('customUnitWrap');if(cu)cu.classList.toggle('hidden',e.target.value!=='другое')}if(e.target.id==='sWeight'){const card=e.target.closest('#modalBody'),warn=document.getElementById('weightWarning');if(warn){const goalId=document.querySelector('[data-action="openGoal"]')?.dataset.id;}}});
    document.addEventListener('change',e=>{if(e.target.matches('[data-book-status]')){const b=data.books.find(x=>x.id===e.target.dataset.bookStatus);if(b){b.status=e.target.value;moveFinishedMedia();save();renderAll()}}if(e.target.matches('[data-watch-status]')){const w=data.watches.find(x=>x.id===e.target.dataset.watchStatus);if(w){w.status=e.target.value;moveFinishedMedia();save();renderAll()}}});
    monthSelect.onchange=()=>{data.selectedMonth=Number(monthSelect.value);clampDay();renderAll()};yearSelect.onchange=()=>{data.selectedYear=Number(yearSelect.value);clampDay();renderAll()};savePulseBtn.onclick=()=>{const p=pulseData();p.steps=stepsInput.value;p.reading=readingInput.value;p.readingUnit=readingUnit.value;renderAll()};modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('open')});
    let monthSwipeX=0;monthCalendarCard.addEventListener('touchstart',e=>monthSwipeX=e.touches[0].clientX,{passive:true});monthCalendarCard.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-monthSwipeX;if(dx<-60)changeMonth(1);if(dx>60)changeMonth(-1)},{passive:true});
    renderAll();
  
</script>
